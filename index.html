<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Yu-Gi-Oh! Life Point Calculator</h1>
    <div class="board">
        <div class="player">
            <h2>Player 1</h2>
            <h3 id="lpPlayer1">8000</h3>
            <div class="buttons">
                <button onclick="applyLP(1, '+')">+</button>
                <button onclick="applyLP(1, '-')">-</button>
                <button onclick="addNum('1')">1</button>
                <button onclick="addNum('2')">2</button>
                <button onclick="addNum('3')">3</button>
                <button onclick="addNum('4')">4</button>
                <button onclick="addNum('5')">5</button>
                <button onclick="addNum('6')">6</button>
                <button onclick="addNum('7')">7</button>
                <button onclick="addNum('8')">8</button>
                <button onclick="addNum('9')">9</button>
                <button onclick="addNum('0')">0</button>
                <button onclick="addNum('00')">00</button>
                <button onclick="addNum('000')">000</button>
                <button onclick="halveLP(1)">1/2</button>
            </div>
        </div>
        <div class="player">
            <h2>Player 2</h2>
            <h3 id="lpPlayer2">8000</h3>
            <div class="buttons">
                <button onclick="applyLP(2, '+')">+</button>
                <button onclick="applyLP(2, '-')">-</button>
                <button onclick="addNum('1')">1</button>
                <button onclick="addNum('2')">2</button>
                <button onclick="addNum('3')">3</button>
                <button onclick="addNum('4')">4</button>
                <button onclick="addNum('5')">5</button>
                <button onclick="addNum('6')">6</button>
                <button onclick="addNum('7')">7</button>
                <button onclick="addNum('8')">8</button>
                <button onclick="addNum('9')">9</button>
                <button onclick="addNum('0')">0</button>
                <button onclick="addNum('00')">00</button>
                <button onclick="addNum('000')">000</button>
                <button onclick="halveLP(2)">1/2</button>
            </div>
        </div>
    </div>
    <button onclick="ResetDuel()">Reset Life Points</button>
    <script src="script.js"></script>
</body>
</html>
